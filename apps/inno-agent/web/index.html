<!doctype html>
<html lang="zh-CN" class="h-full">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Inno Agent</title>
		<script>
			// Apply theme before first paint to prevent flash of wrong theme (FOWT).
			(function () {
				try {
					var t = localStorage.getItem("inno.theme") || "claude";
					var valid = ["light", "warm", "ocean", "innospark", "claude"];
					if (valid.indexOf(t) === -1) t = "claude";
					document.documentElement.setAttribute("data-theme", t);
				} catch (e) {}
			})();
		</script>
	</head>
	<body class="h-full m-0 bg-background text-foreground">
		<div id="root" class="h-full"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>
